<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 90%;
  max-width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 { color: #ff4d6d; font-size: 22px; }

button {
  padding: 12px 20px;
  font-size: 16px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#yes { background: #ff4d6d; color: white; }
#no { background: #ccc; position: relative; }

.balloon {
  position: absolute;
  width: 30px;
  height: 50px;
  border-radius: 50%;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<!-- 🎵 Audio (mobile safe) -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card">
  <h1>Will you be my permanent address? ❤️</h1>
  <button id="yes">Yes 💖</button>
  <button id="no">No 🙈</button>
</div>

<canvas id="confetti"></canvas>

<script>
// 🔴 NO button (works on mobile + PC)
const noBtn = document.getElementById("no");

function moveNo() {
  noBtn.style.position = "absolute";
  noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 50) + "px";
}

noBtn.addEventListener("mouseover", moveNo);   // PC
noBtn.addEventListener("touchstart", moveNo);  // Mobile

// 💖 YES button
document.getElementById("yes").addEventListener("click", () => {
  // play music (works on mobile after click)
  document.getElementById("bgMusic").play();

  document.querySelector(".card").innerHTML = `
    <h1>💖 Many Many Congratulations 💖</h1>
    <h2>Welcome into my heart❤️Shree❤️</h2>
    <h2>❤️Have a Beautifull Morning❤️</h2>
    <p>You just made me the happiest person❤️</p>
  `;

  startCelebration();
});

// 🎈 Balloons
function startCelebration() {
  for (let i = 0; i < 20; i++) {
    const b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.random() * 100 + "vw";
    b.style.background = `hsl(${Math.random()*360},70%,60%)`;
    document.body.appendChild(b);
  }
  startConfetti();
}

// 🎉 Confetti
function startConfetti() {
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let confetti = [];
  for (let i = 0; i < 120; i++) {
    confetti.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 5 + 2,
      d: Math.random() * 10,
      color: `hsl(${Math.random()*360},100%,50%)`
    });
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c => {
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
      ctx.fillStyle = c.color;
      ctx.fill();
    });
    update();
  }

  function update() {
    confetti.forEach(c => {
      c.y += Math.cos(c.d) + 2;
      if (c.y > canvas.height) {
        c.y = -10;
        c.x = Math.random() * canvas.width;
      }
    });
  }

  setInterval(draw, 20);
}
</script>

</body>
</html>
